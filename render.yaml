# Render Blueprint — auto-configures the Static Site on first import.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: pickastudent
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist

    # SPA fallback so deep links don't 404. Real files in dist/ are served
    # directly; only unknown paths get rewritten to the app shell.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      # Hashed bundles are immutable — cache them forever.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /workbox-*.js
        name: Cache-Control
        value: public, max-age=31536000, immutable

      # The app shell, service worker, and manifest must revalidate so new
      # deploys reach users promptly instead of being served from cache.
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /manifest.webmanifest
        name: Cache-Control
        value: no-cache

      # Modest security defaults.
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: no-referrer-when-downgrade
